name: Build Tquic.framework

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download Dear ImGui
        run: bash setup.sh

      - name: Build dylib
        run: bash build.sh

      - name: Package as Tquic.framework
        run: bash package_framework.sh

      - name: Upload framework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tquic.framework
          path: dist/Tquic.framework

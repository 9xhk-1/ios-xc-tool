name: Build Tquic.framework

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install ldid (jailbreak sign tool)
        run: brew install ldid

      - name: Download Dear ImGui
        run: bash setup.sh

      - name: Build dylib
        run: bash build.sh

      - name: Package as Tquic.framework
        run: bash package_framework.sh

      - name: Jailbreak sign with ldid
        run: |
          set -e
          FW="dist/Tquic.framework"
          ldid -S "${FW}/Versions/A/Tquic"
          echo "[+] ldid sign: ${FW}/Versions/A/Tquic"
          # verify
          codesign -dvvv "${FW}/Versions/A/Tquic" 2>&1 | head -5
          # also sign the symlink entry
          ldid -S "${FW}/Tquic" 2>/dev/null || true

      - name: Upload Tquic.framework (jailbreak ready)
        uses: actions/upload-artifact@v4
        with:
          name: Tquic.framework
          path: dist/Tquic.framework
